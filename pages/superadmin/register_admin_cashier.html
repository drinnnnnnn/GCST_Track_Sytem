<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin / Cashier Registration</title>

    <!-- Boxicons & Fonts -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #c9d6ff, #e2e2e2, #aec0ff, #f0f2f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 34px;
            box-shadow: 0 24px 60px rgba(35, 75, 155, 0.12);
            padding: 40px;
            text-align: center;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Icon Styling */
        .header-icon {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), #764ba2);
            border-radius: 20px;
            color: #ffffff;
            font-size: 35px;
            margin: 0 auto 20px;
            box-shadow: 0 12px 25px var(--primary-glow);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Form Fields Scroll Area */
        .form-fields {
            max-height: 380px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 25px;
        }

        .form-fields::-webkit-scrollbar { width: 5px; }
        .form-fields::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .input-group {
            position: relative;
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-dark);
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 8px 15px -3px var(--primary-glow);
            transform: translateY(-2px);
        }

        .show-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            font-size: 20px;
            transition: 0.2s;
        }

        .show-password:hover { color: var(--primary); }

        /* Button Styling */
        button {
            width: 100%;
            padding: 16px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--primary-glow);
        }

        .signin-link {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signin-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        /* Staggered Entrance Animations */
        .animate-item {
            opacity: 0;
            animation: fadeInUp 0.5s ease forwards;
        }

        .header-anim { animation-delay: 0.1s; }
        .form-anim { animation-delay: 0.2s; }
        .btn-anim { animation-delay: 0.3s; }
        .footer-anim { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-anim animate-item">
            <div class="header-icon"><i class='bx bx-user-plus'></i></div>
            <h1>Create Staff Account</h1>
            <p class="subtitle">Set up a new administrator or cashier</p>
        </div>

        <form action="http://localhost/GCST_Track_System/actions/process_admin_cashier.php" method="POST" onsubmit="return validateForm(this)">
            <div class="form-fields form-anim animate-item">
                <div class="input-group">
                    <input type="text" name="last_name" placeholder="Last Name" required>
                </div>
                <div class="input-group">
                    <input type="text" name="first_name" placeholder="First Name" required>
                </div>
                <div class="input-group">
                    <input type="text" name="middle_name" placeholder="Middle Name">
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Staff Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" id="password" placeholder="Password" required>
                    <i class='bx bx-show show-password' id="togglePassword"></i>
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
                    <i class='bx bx-show show-password' id="toggleConfirm"></i>
                </div>
            </div>

            <button type="submit" class="btn-anim animate-item">Register Staff Member</button>

            <div class="signin-link footer-anim animate-item">
                Ready to go? <a href="superadmin_dashb.html">Return to Dashboard</a>
            </div>
        </form>
    </div>

    <script>
        // Toggle password visibility
        const setupToggle = (btnId, inputId) => {
            const btn = document.getElementById(btnId);
            const input = document.getElementById(inputId);
            btn.addEventListener('click', () => {
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                btn.classList.toggle('bx-show', !isPass);
                btn.classList.toggle('bx-hide', isPass);
            });
        };

        setupToggle('togglePassword', 'password');
        setupToggle('toggleConfirm', 'confirm_password');

        // Form validation
        function validateForm(form) {
            if (form.password.value !== form.confirm_password.value) {
                alert("Passwords do not match!");
                form.password.focus();
                return false;
            }
            return true;
        }

        // Success handling
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('success') === '1') {
                alert("Account successfully created!");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
    </script>

</body>
</html>
