<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Sign Up</title>
    
    <!-- Boxicons & Fonts -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-decoration: none;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #c9d6ff, #e2e2e2, #aec0ff, #f0f2f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 24px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 34px;
            box-shadow: 0 24px 60px rgba(35, 75, 155, 0.12);
            padding: 40px;
            position: relative;
            animation: cardEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header & Floating Icon */
        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), #764ba2);
            border-radius: 22px;
            color: #ffffff;
            font-size: 35px;
            margin: 0 auto 15px;
            box-shadow: 0 12px 25px var(--primary-glow);
            animation: iconFloat 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14.5px;
            line-height: 1.5;
        }

        /* Scrollable Form Section */
        .register-scroll {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .register-scroll::-webkit-scrollbar { width: 5px; }
        .register-scroll::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
        }

        .input-box {
            position: relative;
            margin-bottom: 16px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 45px 14px 18px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-dark);
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 8px 15px -3px var(--primary-glow);
            transform: translateY(-2px);
        }

        .input-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #94a3b8;
            transition: 0.3s;
        }

        .toggle-password { cursor: pointer; z-index: 5; }
        .toggle-password:hover { color: var(--primary); }

        /* Buttons & Footer */
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--primary-glow);
        }

        .signin-link {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .signin-link a {
            color: var(--primary);
            font-weight: 700;
        }

        /* Toast / Messages */
        .floating-message {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            min-width: 280px;
            background: var(--primary);
            color: white;
            padding: 14px 22px;
            border-radius: 16px;
            font-weight: 700;
            box-shadow: 0 18px 34px var(--primary-glow);
            opacity: 0;
            transition: 0.4s;
            z-index: 1000;
        }

        .floating-message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .floating-message.error { background: #ef4444; box-shadow: 0 18px 34px rgba(239, 68, 68, 0.3); }

        /* Animation Classes */
        .animate-item { opacity: 0; animation: fadeInUp 0.5s ease forwards; }
        .header-anim { animation-delay: 0.1s; }
        .form-anim { animation-delay: 0.2s; }
        .btn-anim { animation-delay: 0.3s; }
        .footer-anim { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div id="floating-message" class="floating-message"></div>

    <div class="container">
        <form action="http://localhost/GCST_Track_System/actions/sign_up.php" method="POST" onsubmit="return validateForm(this)">
            
            <div class="form-header header-anim animate-item">
                <div class="header-icon"><i class='bx bxs-user-circle'></i></div>
                <h1>Sign Up</h1>
                <p class="subtitle">Create a new account and manage your library profile easily.</p>
            </div>

            <div class="register-scroll form-anim animate-item">
                <div class="input-box">
                    <input type="text" name="student_id" placeholder="Student ID (GC-XXXXXX)" required pattern="^GC-\d{6}$" title="Format: GC-XXXXXX">
                    <i class='bx bxs-id-card'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="last_name" placeholder="Last Name" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="first_name" placeholder="First Name" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="middle_name" placeholder="Middle Name" required>
                    <i class='bx bxs-user'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="sex" placeholder="Male or Female" required pattern="Male|Female">
                    <i class='bx bx-male-female'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="course" placeholder="Course" required>
                    <i class='bx bxs-graduation'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="year_section" placeholder="Year Level (e.g., 1-A)" required pattern="[1-5]-[A-Z]">
                    <i class='bx bxs-layer'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="contact_number" placeholder="Contact Number (11 digits)" required pattern="\d{11}">
                    <i class='bx bxs-phone'></i>
                </div>

                <div class="input-box">
                    <input type="text" name="address" placeholder="Address" required>
                    <i class='bx bxs-map'></i>
                </div>

                <div class="input-box">
                    <input type="email" name="email" placeholder="Email (example@email.com)" required>
                    <i class='bx bxs-envelope'></i>
                </div>

                <div class="input-box">
                    <input type="password" name="password" id="password" placeholder="Password (min 8 chars, 1 special)" required pattern="^(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$">
                    <i class='bx bx-show toggle-password' data-target="password"></i>
                </div>

                <div class="input-box">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
                    <i class='bx bx-show toggle-password' data-target="confirm_password"></i>
                </div>
            </div>
            
            <button type="submit" class="btn btn-anim animate-item">Register Account</button>

            <div class="signin-link footer-anim animate-item">
                Already have an account? <a href="superadmin_dashb.html">Go to Dashboard</a>
            </div>
        </form>
    </div>

    <script>
        const floatingMessage = document.getElementById("floating-message");

        function showToast(message, isError = false) {
            floatingMessage.textContent = message;
            floatingMessage.classList.toggle("error", isError);
            floatingMessage.classList.add("show");
            setTimeout(() => floatingMessage.classList.remove("show"), 4000);
        }

        // URL Status Handling
        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            const status = params.get("status");

            if (status === "success") showToast("Successfully Registered!");
            else if (status === "exists") showToast("Account already exists.", true);
            else if (status === "nomatch") showToast("Passwords do not match.", true);
        });

        // Form Validation
        function validateForm(form) {
            const password = form.password.value;
            const confirm = form.confirm_password.value;
            if (password !== confirm) {
                showToast("Passwords do not match!", true);
                return false;
            }
            return true;
        }

        // Password Toggle Logic
        document.querySelectorAll('.toggle-password').forEach(toggle => {
            toggle.addEventListener('click', function() {
                const input = document.getElementById(this.getAttribute('data-target'));
                const isPass = input.type === 'password';
                input.type = isPass ? 'text' : 'password';
                this.classList.toggle('bx-show', !isPass);
                this.classList.toggle('bx-hide', isPass);
            });
        });
    </script>
</body>
</html>
