<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST User Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="http://localhost/GCST_Track_System/styles/user_css/InUser_home.css" />

<script>
  window.addEventListener('DOMContentLoaded', function() {
    fetch('http://localhost/GCST_Track_System/utils/get_user.php')
      .then(res => res.json())
      .then(data => {
        if (!data.student_id) {
          // Not logged in, redirect to sign up/login page
          window.location.href = "http://localhost/GCST_Track_System/pages/sign_in.html";
        }
      })
      .catch(() => {
        // In case of error, also redirect
        window.location.href = "http://localhost/GCST_Track_System/pages/sign_in.html";
      });
  });
</script>

<style>
  .profile-card {
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    padding: 2rem;
    max-width: 600px;
    margin: 0 auto;
    border: 1px solid #dbeafe;
  }

  .profile-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .profile-avatar {
    width: 100px;
    height: 100px;
    background: #e0e7ff;
    border-radius: 50%;
    margin: 0 auto 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #4f46e5;
  }

  .profile-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .info-item {
    background: #f9f9f9;
    padding: 1rem;
    border-radius: 8px;
    border-left: 4px solid #4f46e5;
  }

  .info-item label {
    font-weight: 600;
    color: #333;
    display: block;
    margin-bottom: 0.5rem;
  }

  .info-item span {
    color: #666;
  }

  .edit-btn {
    display: block;
    margin: 2rem auto 0;
    padding: 0.75rem 2rem;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .edit-btn:hover {
    background: #3730a3;
  }

  @media (max-width: 600px) {
    .profile-info {
      grid-template-columns: 1fr;
    }
  }
</style>

</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="http://localhost/GCST_Track_System/assets/img_icon/granbylogo.png" alt="Library Logo">
      <strong>GCST Tracking System</strong>
    </div>
    
    <nav class="nav-links">
      <a href="#" class="notification-icon" id="notification-bell" title="Notifications">
        🔔
        <span id="notif-badge"></span>
      </a>

      <div class="notification-dropdown" id="notification-dropdown">
        <div class="dropdown-header">Notifications</div>
        <div class="notifications-list" id="notifications-list"></div>
        <div class="dropdown-footer" id="clear-notifications">Clear All</div>
      </div>

      <a href="#" class="menu-icon" id="menu-icon">☰</a>
    </nav>
    <div class="dropdown-menu" id="dropdown-menu">
    <a class="menu-item" href="user_browse_products.html">
      <i class="fas fa-shopping-bag"></i> Browse Products
    </a>
    <a class="menu-item" href="user_rentals.html">
      <i class="fas fa-box"></i> My Rentals
    </a>
    <a class="menu-item" href="user_queue_tickets.html">
      <i class="fas fa-ticket-alt"></i> Queue Tickets
    </a>
    <a class="menu-item" href="user_tuition_fees.html">
      <i class="fas fa-receipt"></i> Tuition Fees
    </a>
    <a class="menu-item" href="user_profile.html">
      <i class="fas fa-user-circle"></i> Profile
    </a>
    <a class="menu-item" href="http://localhost/GCST_Track_System/utils/log_out.php">
      <i class="fas fa-sign-out-alt"></i> Log Out
    </a>
  </div>
</header>

  

  <!-- Main Content -->
  <main style="max-width: 1400px; margin: 0 auto;">

    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1 id="greeting-message">My Profile</h1>
        <p id="current-date-time"></p>
      </div>
      <div class="greeting-icon">👤</div>
    </section>

    <!-- Profile Card -->
    <section class="profile-section">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar">
            <i class="fas fa-user"></i>
          </div>
          <h2 id="student-name">Student Name</h2>
        </div>
        <div class="profile-info">
          <div class="info-item">
            <label>Student ID</label>
            <span id="student-id">Loading...</span>
          </div>
          <div class="info-item">
            <label>Course</label>
            <span id="course">Loading...</span>
          </div>
          <div class="info-item">
            <label>Year Level</label>
            <span id="year-level">Loading...</span>
          </div>
          <div class="info-item">
            <label>Phone Number</label>
            <span id="phone-number">Loading...</span>
          </div>
        </div>
        <button class="edit-btn" onclick="alert('Edit functionality not implemented yet.')">Edit Profile</button>
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script>
    let currentStudentId = null;

    // Initialize greeting and current date/time
    window.addEventListener('DOMContentLoaded', () => {
      fetch('http://localhost/GCST_Track_System/utils/get_user.php')
        .then(res => res.json())
        .then(data => {
          if (data.student_id) {
            currentStudentId = data.student_id;
            updateGreeting(data.name);
            loadProfile(data);
            loadNotifications();
            startNotifPolling();
          }
        });

      updateDateTime();
      setInterval(updateDateTime, 60000); // Update time every minute
    });

    function updateGreeting(studentName) {
      const hour = new Date().getHours();
      let greet = "Hello";
      if (hour < 12) greet = "Good Morning";
      else if (hour < 18) greet = "Good Afternoon";
      else greet = "Good Evening";

      document.getElementById('greeting-message').textContent = `${greet}, ${studentName}!`;
    }

    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('en-US', options);
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('current-date-time').textContent = `${dateStr} • ${timeStr}`;
    }

    function loadProfile(data) {
      document.getElementById('student-name').textContent = data.name || 'N/A';
      document.getElementById('student-id').textContent = data.student_id || 'N/A';
      document.getElementById('course').textContent = data.course || 'N/A';
      document.getElementById('year-level').textContent = data.year_level || 'N/A';
      document.getElementById('phone-number').textContent = data.phone_number || 'N/A';
    }

    // Menu toggle
    document.getElementById('menu-icon').addEventListener('click', (e) => {
      e.preventDefault();
      const menu = document.getElementById('dropdown-menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('dropdown-menu');
      if (!menu.contains(e.target) && !document.getElementById('menu-icon').contains(e.target)) {
        menu.style.display = 'none';
      }
    });

    // Notification functions (similar to InUser_home.html)
    const bell = document.getElementById('notification-bell');
    const dropdown = document.getElementById('notification-dropdown');
    const notificationsList = document.getElementById('notifications-list');
    const clearBtn = document.getElementById('clear-notifications');
    const notifBadge = document.getElementById('notif-badge');

    let notifInterval = null;

    bell.addEventListener('click', (e) => {
      e.preventDefault();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      if (dropdown.style.display === 'block') {
        markAllNotificationsRead(() => {
          loadNotifications();
          startNotifPolling();
        });
      } else {
        stopNotifPolling();
      }
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !bell.contains(e.target)) {
        dropdown.style.display = 'none';
        stopNotifPolling();
      }
    });

    function startNotifPolling() {
      if (notifInterval) clearInterval(notifInterval);
      notifInterval = setInterval(loadNotifications, 5000);
    }

    function stopNotifPolling() {
      if (notifInterval) clearInterval(notifInterval);
      notifInterval = null;
    }

    function loadNotifications() {
      if (!currentStudentId) return;
      fetch('http://localhost/GCST_Track_System/utils/get_notifications.php?student_id=' + encodeURIComponent(currentStudentId))
        .then(res => res.json())
        .then(notifs => {
          notificationsList.innerHTML = '';
          if (notifs.length === 0) {
            notificationsList.innerHTML = '<div class="notification-item">No notifications yet.</div>';
            notifBadge.style.display = 'none';
            return;
          }

          const unreadCount = notifs.filter(n => n.is_read == 0).length;
          if (unreadCount > 0) {
            notifBadge.textContent = unreadCount;
            notifBadge.style.display = 'inline-block';
          } else {
            notifBadge.style.display = 'none';
          }

          notifs.forEach(n => {
            const imgSrc = n.product_image || '/assets/img_bg/product_details.png';
            const item = document.createElement('div');
            item.className = 'notification-item';
            item.style.background = n.is_read == 0 ? '#e0e7ff' : 'white';
            item.innerHTML = `
              <img src="${imgSrc}" alt="Product">
              <div>
                <div class="notification-message">${n.product_name} - ${n.status}</div>
                <div class="notification-time">${new Date(n.notified_at).toLocaleString()}</div>
              </div>
            `;
            notificationsList.appendChild(item);
          });
        });
    }

    function markAllNotificationsRead(callback) {
      if (!currentStudentId) {
        if (typeof callback === 'function') callback();
        return;
      }
      fetch('http://localhost/GCST_Track_System/utils/mark_notifications_read.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: currentStudentId })
      }).then(() => {
        if (typeof callback === 'function') callback();
      });
    }

    clearBtn.addEventListener('click', () => {
      if (!currentStudentId) return;
      fetch('http://localhost/GCST_Track_System/utils/clear_notifications.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ student_id: currentStudentId })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          notificationsList.innerHTML = '<div class="notification-item">No notifications yet.</div>';
          notifBadge.style.display = 'none';
        }
      });
    });
  </script>

</body>
</html>
