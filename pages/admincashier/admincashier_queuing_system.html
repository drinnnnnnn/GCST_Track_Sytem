<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>GCST Admin Cashier Queuing System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="stylesheet" href="http://localhost/GCST_Track_System/styles/user_css/InUser_home.css" />
<style>
  .queue-display-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }
  .queue-display-content {
    background: white;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 600px;
    width: 90%;
  }
  .queue-display-content h2 {
    margin-top: 0;
    color: #333;
  }
  .queue-info {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin: 30px 0;
  }
  .queue-info-item {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 8px;
  }
  .queue-info-item h3 {
    margin: 0 0 10px 0;
    color: #667eea;
  }
  .queue-info-item p {
    font-size: 24px;
    font-weight: bold;
    margin: 0;
    color: #333;
  }
  .close-panel {
    background: #667eea;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
  }

  .quick-actions {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .action-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .action-btn {
    padding: 15px 30px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .action-btn:hover {
    background: #5a67d8;
  }

  .queue-dashboard {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .queue-list {
    margin-top: 20px;
  }
  .queue-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 10px;
    background: #f9f9f9;
  }
  .queue-details {
    display: flex;
    flex-direction: column;
  }
  .queue-number {
    font-size: 18px;
    font-weight: bold;
    color: #333;
  }
  .queue-status {
    font-size: 14px;
    color: #666;
  }
  .status-badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
  }
  .status-waiting {
    background: #fff3cd;
    color: #856404;
  }
  .status-serving {
    background: #d1ecf1;
    color: #0c5460;
  }
  .status-completed {
    background: #d4edda;
    color: #155724;
  }
  .queue-actions {
    display: flex;
    gap: 10px;
  }
  .queue-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .btn-serve {
    background: #28a745;
    color: white;
  }
  .btn-complete {
    background: #007bff;
    color: white;
  }
  .btn-remove {
    background: #dc3545;
    color: white;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  window.addEventListener('DOMContentLoaded', function() {
    fetch('http://localhost/GCST_Track_System/utils/get_user.php')
      .then(res => res.json())
      .then(data => {
        if (!data.admin_id) {
          window.location.href = "http://localhost/GCST_Track_System/pages/sign_in_admin_librarian.html";
        }
      })
      .catch(() => {
        window.location.href = "http://localhost/GCST_Track_System/pages/sign_in_admin_librarian.html";
      });
  });
</script>
</head>

<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <img src="http://localhost/GCST_Track_System/assets/img_icon/granbylogo.png" alt="Library Logo">
      <strong>GCST Tracking System</strong>
    </div>
    
    <nav class="nav-links">
      <a href="#" class="notification-icon" id="notification-bell" title="Notifications">
        🔔
        <span id="notif-badge"></span>
      </a>

      <div class="notification-dropdown" id="notification-dropdown">
        <div class="dropdown-header">Notifications</div>
        <div class="notifications-list" id="notifications-list"></div>
        <div class="dropdown-footer" id="clear-notifications">Clear All</div>
      </div>

      <a href="#" class="menu-icon" id="menu-icon">☰</a>
    </nav>
    <div class="dropdown-menu" id="dropdown-menu">
    <a class="menu-item" href="admincashier_dashb.html">
      <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a class="menu-item" href="admincashier_cashier.html">
      <i class="fas fa-cash-register"></i> Cashier
    </a>
        <a class="menu-item" href="admincashier_sale.html">
      <i class="fas fa-cash-register"></i> Sales
    </a>
    <a class="menu-item" href="admincashier_inventory.html">
      <i class="fas fa-boxes"></i> Inventory
    </a>
    <a class="menu-item" href="admincashier_products.html">
      <i class="fas fa-boxes"></i> Products
    </a>
    <a class="menu-item" href="admincashier_reports.html">
      <i class="fas fa-chart-line"></i> Reports
    </a>
    <a class="menu-item" href="admincashier_gmail_notification.html">
      <i class="fas fa-boxes"></i> Gmail Notification
    </a>
    <a class="menu-item" href="admincashier_profile.html">
      <i class="fas fa-user-circle"></i> Profile
    </a>
    <a class="menu-item" href="http://localhost/GCST_Track_System/utils/log_out.php">
      <i class="fas fa-sign-out-alt"></i> Log Out
    </a>
  </div>
</header>

  

  <!-- Queue Display Panel -->
  <div class="queue-display-panel" id="queue-display-panel">
    <div class="queue-display-content">
      <h2>Queue Display</h2>
      <div class="queue-info">
        <div class="queue-info-item">
          <h3>Current Time</h3>
          <p id="display-current-time">--:--:--</p>
        </div>
        <div class="queue-info-item">
          <h3>Now Serving</h3>
          <p id="display-now-serving">None</p>
        </div>
        <div class="queue-info-item">
          <h3>Next Queue</h3>
          <p id="display-next-queue">None</p>
        </div>
      </div>
      <button class="close-panel" onclick="closeQueueDisplay()">Close</button>
    </div>
  </div>

  <!-- Main Content -->
  <main style="max-width: 1400px; margin: 0 auto;">

    <!-- Greeting Section -->
    <section class="greeting-section">
      <div class="greeting-content">
        <h1 id="greeting-message">Welcome, Admin Cashier!</h1>
        <p id="current-date-time"></p>
      </div>
      <div class="greeting-icon">👋</div>
    </section>

    <!-- Quick Actions -->
    <section class="quick-actions">
      <h2>Queue Management</h2>
      <div class="action-buttons">
        <button class="action-btn" onclick="openQueueDisplay()">
          <i class="fas fa-tv"></i> View Queue Display
        </button>
        <button class="action-btn" onclick="generateQueue()">
          <i class="fas fa-plus"></i> Generate Queue Number
        </button>
      </div>
    </section>

    <!-- Waiting Queue Dashboard -->
    <section class="queue-dashboard">
      <h2>Active Queues</h2>
      <div class="queue-list" id="queue-list">
        <!-- Queue items will be loaded here -->
      </div>
    </section>

  </main>

  <!-- Scripts -->
  <script>
    let currentAdminId = null;

    // Initialize greeting and current date/time
    window.addEventListener('DOMContentLoaded', () => {
      fetch('http://localhost/GCST_Track_System/utils/get_user.php')
        .then(res => res.json())
        .then(data => {
          if (data.admin_id) {
            currentAdminId = data.admin_id;
            updateGreeting(data.name);
            loadNotifications();
            startNotifPolling();
          }
        });

      updateDateTime();
      setInterval(updateDateTime, 60000); // Update time every minute

      // Load active queues
      loadActiveQueues();
    });

    function updateGreeting(adminName) {
      const hour = new Date().getHours();
      let greet = "Hello";
      if (hour < 12) greet = "Good Morning";
      else if (hour < 18) greet = "Good Afternoon";
      else greet = "Good Evening";

      document.getElementById('greeting-message').textContent = `${greet}, ${adminName}!`;
    }

    function updateDateTime() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('en-US', options);
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('current-date-time').textContent = `${dateStr} • ${timeStr}`;
    }

    // Menu toggle
    document.getElementById('menu-icon').addEventListener('click', (e) => {
      e.preventDefault();
      const menu = document.getElementById('dropdown-menu');
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('dropdown-menu');
      if (!menu.contains(e.target) && !document.getElementById('menu-icon').contains(e.target)) {
        menu.style.display = 'none';
      }
    });

    // Notification functions (same as dashboard)
    const bell = document.getElementById('notification-bell');
    const dropdown = document.getElementById('notification-dropdown');
    const notificationsList = document.getElementById('notifications-list');
    const clearBtn = document.getElementById('clear-notifications');
    const notifBadge = document.getElementById('notif-badge');

    let notifInterval = null;

    bell.addEventListener('click', (e) => {
      e.preventDefault();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      if (dropdown.style.display === 'block') {
        markAllNotificationsRead(() => {
          loadNotifications();
          startNotifPolling();
        });
      } else {
        stopNotifPolling();
      }
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !bell.contains(e.target)) {
        dropdown.style.display = 'none';
        stopNotifPolling();
      }
    });

    function startNotifPolling() {
      if (notifInterval) clearInterval(notifInterval);
      notifInterval = setInterval(loadNotifications, 5000);
    }

    function stopNotifPolling() {
      if (notifInterval) clearInterval(notifInterval);
      notifInterval = null;
    }

    function loadNotifications() {
      if (!currentAdminId) return;
      fetch('http://localhost/GCST_Track_System/utils/get_notifications.php?admin_id=' + encodeURIComponent(currentAdminId))
        .then(res => res.json())
        .then(notifs => {
          notificationsList.innerHTML = '';
          if (notifs.length === 0) {
            notificationsList.innerHTML = '<div class="notification-item">No notifications yet.</div>';
            notifBadge.style.display = 'none';
            return;
          }

          const unreadCount = notifs.filter(n => n.is_read == 0).length;
          if (unreadCount > 0) {
            notifBadge.textContent = unreadCount;
            notifBadge.style.display = 'inline-block';
          } else {
            notifBadge.style.display = 'none';
          }

          notifs.forEach(n => {
            const imgSrc = n.product_image || '/assets/img_bg/product_details.png';
            const item = document.createElement('div');
            item.className = 'notification-item';
            item.style.background = n.is_read == 0 ? '#e0e7ff' : 'white';
            item.innerHTML = `
              <img src="${imgSrc}" alt="Product">
              <div>
                <div class="notification-message">${n.product_name} - ${n.status}</div>
                <div class="notification-time">${new Date(n.notified_at).toLocaleString()}</div>
              </div>
            `;
            notificationsList.appendChild(item);
          });
        });
    }

    function markAllNotificationsRead(callback) {
      if (!currentAdminId) {
        if (typeof callback === 'function') callback();
        return;
      }
      fetch('http://localhost/GCST_Track_System/utils/mark_notifications_read.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id: currentAdminId })
      }).then(() => {
        if (typeof callback === 'function') callback();
      });
    }

    clearBtn.addEventListener('click', () => {
      if (!currentAdminId) return;
      fetch('http://localhost/GCST_Track_System/utils/clear_notifications.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_id: currentAdminId })
      })
      .then(res => res.json())
      .then(res => {
        if (res.success) {
          notificationsList.innerHTML = '<div class="notification-item">No notifications yet.</div>';
          notifBadge.style.display = 'none';
        }
      });
    });

    // Queue functions
    function openQueueDisplay() {
      document.getElementById('queue-display-panel').style.display = 'flex';
      loadQueueStatus();
    }

    function closeQueueDisplay() {
      document.getElementById('queue-display-panel').style.display = 'none';
    }

    function loadQueueStatus() {
      fetch('http://localhost/GCST_Track_System/utils/get_queue_status.php')
        .then(res => res.json())
        .then(data => {
          document.getElementById('display-current-time').textContent = data.current_time;
          document.getElementById('display-now-serving').textContent = data.now_serving || 'None';
          document.getElementById('display-next-queue').textContent = data.next_queue || 'None';
        })
        .catch(err => console.error('Error loading queue status:', err));
    }

    function generateQueue() {
      fetch('http://localhost/GCST_Track_System/utils/generate_queue.php', {
        method: 'POST'
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          alert('New queue number generated: ' + data.queue_number);
          loadActiveQueues();
        } else {
          alert('Failed to generate queue: ' + data.error);
        }
      })
      .catch(err => console.error('Error generating queue:', err));
    }

    function loadActiveQueues() {
      fetch('http://localhost/GCST_Track_System/utils/get_active_queues.php')
        .then(res => res.json())
        .then(queues => {
          const queueList = document.getElementById('queue-list');
          queueList.innerHTML = '';

          if (queues.length === 0) {
            queueList.innerHTML = '<p>No active queues.</p>';
            return;
          }

          queues.forEach(queue => {
            const item = document.createElement('div');
            item.className = 'queue-item';
            item.innerHTML = `
              <div class="queue-details">
                <div class="queue-number">${queue.queue_number}</div>
                <div class="queue-status">
                  <span class="status-badge status-${queue.status}">${queue.status.charAt(0).toUpperCase() + queue.status.slice(1)}</span>
                  <span>Created: ${new Date(queue.created_at).toLocaleString()}</span>
                </div>
              </div>
              <div class="queue-actions">
                ${queue.status === 'waiting' ? '<button class="queue-btn btn-serve" onclick="updateQueueStatus(' + queue.id + ', \'serving\')">Serve</button>' : ''}
                ${queue.status === 'serving' ? '<button class="queue-btn btn-complete" onclick="updateQueueStatus(' + queue.id + ', \'completed\')">Complete</button>' : ''}
                <button class="queue-btn btn-remove" onclick="updateQueueStatus(' + queue.id + ', \'completed\')">Remove</button>
              </div>
            `;
            queueList.appendChild(item);
          });
        })
        .catch(err => console.error('Error loading active queues:', err));
    }

    function updateQueueStatus(queueId, status) {
      fetch('http://localhost/GCST_Track_System/utils/update_queue_status.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ queue_id: queueId, status: status })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          loadActiveQueues();
        } else {
          alert('Failed to update queue status: ' + data.error);
        }
      })
      .catch(err => console.error('Error updating queue status:', err));
    }
  </script>

</body>
</html>
