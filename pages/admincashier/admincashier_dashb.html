<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Admin Cashier</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(to bottom, #334155, #0f172a);
    background-attachment: fixed;
    font-family: 'Poppins', sans-serif;
  }
  
  .main-content {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    color: #000000;
    font-family: 'Poppins', sans-serif;
  }

  .greeting-section {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
  }

  .greeting-section h1 {
    margin: 0;
    font-size: 28px;
  }

  .greeting-section p {
    margin: 5px 0 0 0;
    font-size: 14px;
    opacity: 0.9;
  }

  .dashboard-box {
    background-color: #ffffff;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    margin-bottom: 30px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }

  .card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
    height: 80px;
    color: #000000;
  }

  .card-content {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .card .icon {
    font-size: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card .text h2 {
    font-size: 14px;
    margin: 0;
    color: #555;
  }

  .card p {
    font-size: 26px;
    font-weight: bold;
    margin: 0;
    text-align: right;
  }

  .charts-section {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    margin-bottom: 30px;
  }

  .chart-container {
    background-color: #ffffff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
  }

  .chart-container h3 {
    margin-top: 0;
    color: #333;
    font-size: 16px;
  }

  .chart-wrapper {
    position: relative;
    height: 300px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  .quick-actions {
    margin-top: 30px;
  }

  .quick-actions h3 {
    margin-bottom: 15px;
    color: #000000;
  }

  .quick-actions button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-size: 14px;
    margin-right: 10px;
    background-color: #667eea;
    color: white;
    transition: background-color 0.3s;
  }

  .quick-actions button:hover {
    background-color: #764ba2;
  }

  button img {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: 6px;
  }

  @media (max-width: 768px) {
    .cards {
    grid-template-columns: 1fr;
    }
    .charts-section {
    grid-template-columns: 1fr;
    }
  }
</style>

<body>

<aside class="sidebar">
  <div>
    <div class="logo-container">
    <img src="http://localhost/GCST_Track_Sytem/assets/img_icon/granby_logo.png" alt="Logo" class="logo-img">
    <h3 class="logo-title">GCST Library</h3>
    </div>

    <nav class="nav-menu">
    <a href="admincashier_dashb.html" class="nav-link active">
      <img src="http://localhost/GCST_Track_Sytem/assets/sidebar_img/dashbc.png" alt="Dashboard Icon" class="icon">
      Dashboard
    </a>
    <a href="admincashier_sales.html" class="nav-link">
      <img src="http://localhost/GCST_Track_Sytem/assets/sidebar_img/addgrey.png" alt="Sales Icon" class="icon">
      Sales
    </a>
    <a href="admincashier_inventory.html" class="nav-link">
      <img src="http://localhost/GCST_Track_Sytem/assets/sidebar_img/bookpen.png" alt="Inventory Icon" class="icon">
      Inventory
    </a>
    <a href="#" class="nav-link logout" onclick="confirmLogout(event)">
      <img src="http://localhost/GCST_Track_Sytem/assets/sidebar_img/outv.png" alt="Logout Icon" class="icon">
      Logout
    </a>
    </nav>
  </div>
</aside>

<div class="main-content">
  <div class="greeting-section">
  <h1>Welcome, <span id="userGreeting">Admin Cashier</span>!</h1>
  <p id="currentDateTime"></p>
  </div>

  <div class="dashboard-box cards">
  <div class="card">
    <div class="card-content">
    <div class="icon">💰</div>
    <div class="text"><h2>Total Sales Today</h2></div>
    </div>
    <p id="totalSalesToday">₱0.00</p>
  </div>

  <div class="card">
    <div class="card-content">
    <div class="icon">📦</div>
    <div class="text"><h2>Items in Inventory</h2></div>
    </div>
    <p id="totalInventory">0</p>
  </div>

  <div class="card">
    <div class="card-content">
    <div class="icon">⏳</div>
    <div class="text"><h2>Pending Queue</h2></div>
    </div>
    <p id="pendingQueue">0</p>
  </div>

  <div class="card">
    <div class="card-content">
    <div class="icon">📚</div>
    <div class="text"><h2>Books Rented</h2></div>
    </div>
    <p id="booksRented">0</p>
  </div>

  <div class="card">
    <div class="card-content">
    <div class="icon">🛒</div>
    <div class="text"><h2>Books Sold</h2></div>
    </div>
    <p id="booksSold">0</p>
  </div>

  <div class="card">
    <div class="card-content">
    <div class="icon">📊</div>
    <div class="text"><h2>Total Transactions</h2></div>
    </div>
    <p id="totalTransactions">0</p>
  </div>
  </div>

  <div class="charts-section">
  <div class="chart-container">
    <h3>Sales Overview</h3>
    <div class="chart-wrapper">
    <canvas id="salesChart"></canvas>
    </div>
  </div>

  <div class="chart-container">
    <h3>Inventory Distribution</h3>
    <div class="chart-wrapper">
    <canvas id="inventoryChart"></canvas>
    </div>
  </div>

  <div class="chart-container full-width">
    <h3>Top Selling Products</h3>
    <div class="chart-wrapper">
    <canvas id="topProductsChart"></canvas>
    </div>
  </div>
  </div>

  <div class="dashboard-box quick-actions">
  <h3>Quick Actions:</h3>
  <button onclick="window.location.href='admincashier_sales.html'">💳 New Sale</button>
  <button onclick="window.location.href='admincashier_inventory.html'">📦 Manage Inventory</button>
  <button onclick="printReport()">🖨️ Print Report</button>
  </div>
</div>

<script>
// Update current date and time
function updateDateTime() {
  const now = new Date();
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('currentDateTime').textContent = now.toLocaleDateString('en-US', options);
}
updateDateTime();
setInterval(updateDateTime, 60000);

// Fetch dashboard data
fetch('/GCST_Track_Sytem/utils/get_cashier_dashboard.php')
  .then(res => res.json())
  .then(data => {
  document.getElementById('totalSalesToday').textContent = '₱' + (data.total_sales_today ?? 0).toFixed(2);
  document.getElementById('totalInventory').textContent = data.total_inventory ?? 0;
  document.getElementById('pendingQueue').textContent = data.pending_queue ?? 0;
  document.getElementById('booksRented').textContent = data.books_rented ?? 0;
  document.getElementById('booksSold').textContent = data.books_sold ?? 0;
  document.getElementById('totalTransactions').textContent = data.total_transactions ?? 0;
  })
  .catch(err => console.error('Error fetching dashboard data:', err));

// Fetch chart data
fetch('/GCST_Track_Sytem/utils/get_cashier_charts.php')
  .then(res => res.json())
  .then(data => {
  // Sales Chart
  const salesCtx = document.getElementById('salesChart').getContext('2d');
  new Chart(salesCtx, {
    type: 'line',
    data: {
    labels: data.sales_labels,
    datasets: [{
      label: 'Daily Sales (₱)',
      data: data.sales_data,
      borderColor: '#667eea',
      backgroundColor: 'rgba(102, 126, 234, 0.1)',
      tension: 0.4,
      fill: true
    }]
    },
    options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: true } }
    }
  });

  // Inventory Chart
  const inventoryCtx = document.getElementById('inventoryChart').getContext('2d');
  new Chart(inventoryCtx, {
    type: 'doughnut',
    data: {
    labels: data.inventory_labels,
    datasets: [{
      data: data.inventory_data,
      backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
    }]
    },
    options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: true } }
    }
  });

  // Top Products Chart
  const productsCtx = document.getElementById('topProductsChart').getContext('2d');
  new Chart(productsCtx, {
    type: 'bar',
    data: {
    labels: data.products_labels,
    datasets: [{
      label: 'Units Sold',
      data: data.products_data,
      backgroundColor: '#667eea'
    }]
    },
    options: {
    responsive: true,
    maintainAspectRatio: false,
    indexAxis: 'y',
    plugins: { legend: { display: true } }
    }
  });
  })
  .catch(err => console.error('Error fetching chart data:', err));

// Logout confirmation
function confirmLogout(event) {
  event.preventDefault();
  if (confirm("Are you sure you want to logout?")) {
  localStorage.clear();
  window.location.href = "http://localhost/GCST_Track_Sytem/pages/sign_in_admin_librarian.html";
  }
}

// Print report
function printReport() {
  window.print();
}
</script>

</body>
</html>
